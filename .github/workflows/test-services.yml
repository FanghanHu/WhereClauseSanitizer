name: Test Services

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build and start services with docker compose
        run: |
          docker compose up -d
          sleep 30
      
      - name: Test SQL Server connectivity
        run: |
          docker exec where_clause_sanitizer_db /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P 'Str0ng!Passw0rd' -C \
            -Q 'SELECT @@version;' || exit 1
      
      - name: Test Web Server health
        run: |
          max_attempts=30
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            if curl -f http://localhost:3000/api/feed; then
              echo "Web Server is healthy"
              exit 0
            fi
            echo "Attempt $attempt failed, retrying..."
            sleep 5
            attempt=$((attempt + 1))
          done
          echo "Web Server health check failed after $max_attempts attempts"
          exit 1
      
      - name: Cleanup
        if: always()
        run: docker compose down